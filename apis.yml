aid: cosmolex
name: CosmoLex
description: >
  CosmoLex is a cloud-based legal practice management platform that combines
  matter management, time tracking, billing, trust accounting, and client
  engagement in a single system. It provides a web services API for integrating
  matters, time entries, billing, trust accounting, and compliance workflows,
  subject to a per-user-license monthly call quota. CosmoLex serves solo
  practitioners and law firms up to 100 users and is designed to satisfy state
  bar trust accounting compliance requirements.
