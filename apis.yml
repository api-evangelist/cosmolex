apis:
  - aid: cosmolex:cosmolex-api
    name: CosmoLex API
    description: >
      Web services API for CosmoLex legal practice management. Enables
      programmatic access to matters, time entries, billing, trust accounting,
      documents, and client data. Access is subject to a maximum of 1,000 API
      calls per user license per month as defined in the Subscription Agreement.
      No public developer portal is published; integrators should contact
      CosmoLex for partner API access.
    humanURL: https://www.cosmolex.com/integrations/
